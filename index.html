<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Semana — kittyplan 🐱</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAW9BgISe_ZYipIA9sNBzYFtvnAwM8NCGQ",
    authDomain: "kittyplan-2c08d.firebaseapp.com",
    projectId: "kittyplan-2c08d",
    storageBucket: "kittyplan-2c08d.firebasestorage.app",
    messagingSenderId: "1036903357840",
    appId: "1:1036903357840:web:3c78cae6f9496ff417e715"
  };

  const app      = initializeApp(firebaseConfig);
  const db       = getFirestore(app);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  let currentUID = null;
  let unsubSnapshot = null;

  function getUserDoc(uid) {
    return doc(db, "kittyplan", uid);
  }

  function subscribeToUserDoc(uid) {
    if (unsubSnapshot) unsubSnapshot();
    unsubSnapshot = onSnapshot(getUserDoc(uid), (snap) => {
      if (!snap.exists()) return;
      const raw = snap.data();
      try {
        if (raw.sem_data)     { window._data        = JSON.parse(raw.sem_data);     }
        if (raw.sem_custom)   { window._customTasks  = JSON.parse(raw.sem_custom);   }
        if (raw.recurring_tasks)    { window._recurringTasks    = JSON.parse(raw.recurring_tasks);    }
        if (raw.completions)         { window._completions        = JSON.parse(raw.completions);         }
        if (raw.rutina_templates)    { window._rutinaTemplates    = JSON.parse(raw.rutina_templates);    }
        if (raw.rutina_asignaciones) { window._rutinaAsignaciones = JSON.parse(raw.rutina_asignaciones); }
        if (raw.rutina_completions)  { window._rutinaCompletions  = JSON.parse(raw.rutina_completions);  }
        if (raw.desglose_items)      { window._desgloseItems      = JSON.parse(raw.desglose_items);      }
        if (raw.gratitud_data)       { window._gratitudData       = JSON.parse(raw.gratitud_data);       }
        if (raw.sueno_data)          { window._suenoData          = JSON.parse(raw.sueno_data);          }
        if (raw.mens_data)           { window._mensData           = JSON.parse(raw.mens_data);           }
        if (raw.deco_imgs)           { window._decoImgs           = JSON.parse(raw.deco_imgs);           }
        if (raw.deco_interval)       { window._decoInterval       = raw.deco_interval;                            }
        if (raw.ej_templates)        { window._ejTemplates        = JSON.parse(raw.ej_templates);        }
        if (raw.ej_registros)        { window._ejRegistros        = JSON.parse(raw.ej_registros);        }
        if (raw.dios_data)           { window._diosData           = JSON.parse(raw.dios_data);           }
        if (raw.versiculos)          { window._versiculos         = JSON.parse(raw.versiculos);           }
        if (raw.ci_state)     { window._checkinState = JSON.parse(raw.ci_state);     }
        if (raw.nd_state)     { window._needsState   = JSON.parse(raw.nd_state);     }
        if (raw.calm_tools)   { window._calmTools    = JSON.parse(raw.calm_tools);   }
        if (raw.water_goal)   { window._waterGoal    = parseInt(raw.water_goal);     }
        if (raw.water_state)  { window._waterState   = JSON.parse(raw.water_state);  }
        if (raw.food_state)   { window._foodState    = JSON.parse(raw.food_state);   }
        if (raw.logros_data)  { window._logrosData   = JSON.parse(raw.logros_data);  }
        if (raw.fortalezas)   { window._fortalezas   = JSON.parse(raw.fortalezas);   }
        if (raw.cambio_state) { window._cambioState  = JSON.parse(raw.cambio_state); }
        if (raw.cambio_custom){ window._cambioCustom = JSON.parse(raw.cambio_custom);}
        if (typeof window.syncFromCloud === 'function') window.syncFromCloud();
      } catch(e) { console.warn("sync parse error", e); }
    });
  }

  window.cloudSave = async function(key, value) {
    if (!currentUID) return;
    try {
      await setDoc(getUserDoc(currentUID), { [key]: JSON.stringify(value) }, { merge: true });
    } catch(e) { console.warn("cloudSave error", e); }
  };

  window.cloudLoad = async function() {
    if (!currentUID) return {};
    try {
      const snap = await getDoc(getUserDoc(currentUID));
      return snap.exists() ? snap.data() : {};
    } catch(e) { console.warn("cloudLoad error", e); return {}; }
  };

  async function doSignIn() {
    const btn = document.getElementById('login-btn');
    if (!btn) return;
    try {
      btn.disabled = true;
      btn.innerHTML = '<span style="font-size:1.1rem;animation:pulse 1s infinite">🌙</span> Conectando...';
      await signInWithPopup(auth, provider);
    } catch(e) {
      console.warn("signIn error", e);
      btn.disabled = false;
      btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px;height:18px;">Continuar con Google';
    }
  }

  async function doSignOut() {
    if (unsubSnapshot) unsubSnapshot();
    await signOut(auth);
  }

  // Attach button listeners once DOM is ready
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('login-btn');
    if (btn) btn.addEventListener('click', doSignIn);
    const outBtn = document.getElementById('signout-btn');
    if (outBtn) outBtn.addEventListener('click', () => {
      if (confirm('¿Cerrar sesión?')) doSignOut();
    });
  });

  // Also expose globally as fallback (for non-module contexts)
  window.signInWithGoogle = doSignIn;
  window.signOutUser = doSignOut;

  // Auth state observer
  onAuthStateChanged(auth, (user) => {
    const loginScreen = document.getElementById('login-screen');
    const appScreen   = document.getElementById('app-screen');
    if (user) {
      currentUID = user.uid;
      subscribeToUserDoc(user.uid);
      // Update user info in header
      const nameEl = document.getElementById('user-display-name');
      const avatarEl = document.getElementById('user-avatar');
      if (nameEl) nameEl.textContent = user.displayName ? user.displayName.split(' ')[0] : 'tú';
      if (avatarEl && user.photoURL) avatarEl.src = user.photoURL;
      // Show app, hide login
      if (loginScreen) loginScreen.style.display = 'none';
      if (appScreen)   appScreen.style.display   = '';
      // Signal ready
      window._firebaseReady = true;
      document.dispatchEvent(new Event('firebase-ready'));
    } else {
      currentUID = null;
      if (loginScreen) loginScreen.style.display = '';
      if (appScreen)   appScreen.style.display   = 'none';
    }
  });
</script>
<style>
  :root {
    --bg:       #faf6f1;
    --surface:  #f5ede4;
    --card:     #fffcf8;
    --border:   #ead8cc;

    --rosa:     #d4748a;
    --rosa-soft:#f5dce3;
    --verde:    #7a9e6e;
    --verde-soft:#ddeedd;
    --beige:    #c9a882;
    --beige-soft:#f2e6d6;

    --text:     #3a2e28;
    --muted:    #9e8a7e;
    --muted2:   #bfaa9e;

    --manana-bg:   #fef3e8;
    --manana-border:#e8b87a;
    --manana-icon: #d4944a;

    --tarde-bg:    #fde8ee;
    --tarde-border:#e895ad;
    --tarde-icon:  #d4748a;

    --noche-bg:    #eaf2e8;
    --noche-border:#8fc07e;
    --noche-icon:  #5a8a4e;

    --cell-size: 36px;
    --radius: 12px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 1.8rem;
    animation: fadeDown .5s ease both;
  }

  .week-label {
    font-size: 0.65rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--verde);
    font-weight: 600;
    margin-bottom: .4rem;
    display: block;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    color: var(--text);
    line-height: 1.1;
  }

  h1 em { color: var(--rosa); font-style: italic; }

  .nav-week {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-top: .9rem;
  }

  .nav-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 50%;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: .9rem;
    color: var(--muted);
    transition: border-color .2s, color .2s;
    display:flex; align-items:center; justify-content:center;
  }
  .nav-btn:hover { border-color: var(--rosa); color: var(--rosa); }

  .current-week {
    font-size: .78rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: .04em;
    min-width: 160px;
    text-align: center;
  }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    margin-bottom: 1.4rem;
    flex-wrap: wrap;
    animation: fadeDown .5s .1s ease both;
    opacity: 0;
    animation-fill-mode: both;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: .4rem;
    font-size: .7rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: .05em;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* ── GRID WRAPPER ── */
  .grid-outer {
    max-width: 900px;
    margin: 0 auto;
    animation: fadeUp .5s .15s ease both;
    opacity: 0;
    animation-fill-mode: both;
  }

  /* Days header row */
  .days-header {
    display: grid;
    grid-template-columns: 90px repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 6px;
  }

  .day-col {
    text-align: center;
    padding: .5rem .2rem .3rem;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
  }

  .day-col.today {
    background: var(--rosa-soft);
    border-color: var(--rosa);
  }

  .day-name {
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .day-col.today .day-name { color: var(--rosa); }

  .day-num {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .day-col.today .day-num { color: var(--rosa); }

  /* Slot label column */
  .slot-label-col {
    /* filled by JS */
  }

  /* ── BLOCK ROW ── */
  .block-section {
    margin-bottom: 8px;
  }

  .block-row {
    display: grid;
    grid-template-columns: 90px repeat(3, 1fr);
    gap: 6px;
  }

  /* Slot label */
  .slot-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: .5rem .3rem;
    border-radius: var(--radius);
    gap: .25rem;
    border: 1.5px solid transparent;
  }

  .slot-label .slot-icon { font-size: 1.2rem; line-height:1; }
  .slot-label .slot-name {
    font-size: .6rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    text-align: center;
  }
  .slot-label .slot-time {
    font-size: .58rem;
    font-weight: 500;
    text-align: center;
    opacity: .75;
  }

  .slot-manana  { background: var(--manana-bg);  border-color: var(--manana-border); color: var(--manana-icon); }
  .slot-tarde   { background: var(--tarde-bg);   border-color: var(--tarde-border);  color: var(--tarde-icon); }
  .slot-noche   { background: var(--noche-bg);   border-color: var(--noche-border);  color: var(--noche-icon); }

  /* ── CELL ── */
  .cell {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    min-height: 90px;
    padding: .5rem .5rem .4rem;
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: default;
    transition: border-color .2s, box-shadow .2s;
    position: relative;
  }

  .cell:hover { border-color: var(--muted2); }

  .cell.slot-manana-cell { border-top: 3px solid var(--manana-border); }
  .cell.slot-tarde-cell  { border-top: 3px solid var(--tarde-border); }
  .cell.slot-noche-cell  { border-top: 3px solid var(--noche-border); }

  .cell.today-cell {
    background: #fffaf8;
    box-shadow: 0 0 0 2px var(--rosa-soft);
  }

  /* ── TASK PILL ── */
  .task-pill {
    display: flex;
    align-items: flex-start;
    gap: 5px;
    padding: .22rem .45rem;
    border-radius: 20px;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    user-select: none;
    font-size: .68rem;
    font-weight: 600;
    line-height: 1.3;
    word-break: break-word;
    white-space: normal;
    min-width: 0;
  }

  .task-pill:active { transform: scale(.97); }

  .task-pill.done {
    opacity: .45;
    text-decoration: line-through;
  }

  .task-pill .pill-check {
    width: 13px; height: 13px;
    min-width: 13px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    flex-shrink: 0;
    display: flex; align-items:center; justify-content:center;
    font-size: .5rem;
    transition: background .15s;
    margin-top: 1px;
  }

  .task-pill.done .pill-check {
    background: currentColor;
    color: white;
  }
  .task-pill.done .pill-check::after { content: '✓'; color: white; }

  /* pill color variants */
  .pill-m { background: var(--manana-bg); color: var(--manana-icon); }
  .pill-t { background: var(--tarde-bg);  color: #b85070; }
  .pill-n { background: var(--verde-soft); color: var(--noche-icon); }

  /* ── ADD TASK ── */
  .add-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: .2rem .4rem;
    border-radius: 20px;
    border: 1.5px dashed var(--muted2);
    color: var(--muted2);
    font-size: .63rem;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    transition: border-color .2s, color .2s;
    margin-top: auto;
  }

  .add-pill:hover { border-color: var(--rosa); color: var(--rosa); }

  /* inline edit input */
  .edit-input {
    font-family: 'Nunito', sans-serif;
    font-size: .68rem;
    font-weight: 600;
    background: white;
    border: 1.5px solid var(--rosa);
    border-radius: 20px;
    padding: .2rem .5rem;
    outline: none;
    width: 100%;
    color: var(--text);
  }

  /* ── PROGRESS BAR ── */
  .week-progress {
    max-width: 900px;
    margin: 1rem auto 0;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: .7rem 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    animation: fadeUp .5s .3s ease both;
    opacity: 0;
    animation-fill-mode: both;
  }

  .prog-label {
    font-size: .7rem;
    color: var(--muted);
    font-weight: 600;
    white-space: nowrap;
  }

  .prog-track {
    flex: 1;
    height: 6px;
    background: var(--surface);
    border-radius: 3px;
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--rosa), var(--verde));
    border-radius: 3px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  .prog-pct {
    font-size: .75rem;
    color: var(--rosa);
    font-weight: 700;
    min-width: 34px;
    text-align: right;
  }

  /* ── RESET ── */
  .footer {
    max-width: 900px;
    margin: 1rem auto 0;
    display: flex;
    justify-content: center;
    gap: .8rem;
    flex-wrap: wrap;
  }

  .foot-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: .7rem;
    font-weight: 600;
    padding: .4rem 1rem;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: .05em;
    transition: all .2s;
  }
  .foot-btn:hover { border-color: var(--rosa); color: var(--rosa); }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-12px); }
    to   { opacity:1; transform:none; }
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:none; }
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    position: fixed;
    inset: 0;
    background: #1a1428;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 2rem;
    animation: fadeDown .5s ease both;
    overflow: hidden;
  }

  /* Capas de imágenes de fondo con opacidad baja */
  #login-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      url('https://images.unsplash.com/photo-1532978379173-523e16f371f9?w=1200&q=80') center/cover no-repeat,
      #1a1428;
    opacity: 0.18;
    z-index: 0;
  }

  .login-bg-imgs {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .login-bg-imgs img {
    position: absolute;
    border-radius: 16px;
    opacity: 0.13;
    object-fit: cover;
    filter: saturate(0.7) brightness(0.8);
  }

  .login-bg-imgs img:nth-child(1) {
    width: 280px; height: 200px;
    top: 5%; left: -4%;
    transform: rotate(-8deg);
  }
  .login-bg-imgs img:nth-child(2) {
    width: 220px; height: 280px;
    top: -3%; right: 2%;
    transform: rotate(6deg);
  }
  .login-bg-imgs img:nth-child(3) {
    width: 260px; height: 180px;
    bottom: 8%; left: 5%;
    transform: rotate(5deg);
  }
  .login-bg-imgs img:nth-child(4) {
    width: 200px; height: 240px;
    bottom: 3%; right: -2%;
    transform: rotate(-7deg);
  }
  .login-bg-imgs img:nth-child(5) {
    width: 180px; height: 160px;
    top: 42%; left: -3%;
    transform: rotate(3deg);
  }
  .login-bg-imgs img:nth-child(6) {
    width: 160px; height: 200px;
    top: 38%; right: -1%;
    transform: rotate(-5deg);
  }

  /* Overlay suave encima de las fotos */
  .login-overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse at center, rgba(26,20,40,0.55) 0%, rgba(26,20,40,0.85) 100%);
    pointer-events: none;
  }

  .login-card {
    position: relative;
    z-index: 3;
    background: rgba(255,252,248, 0.10);
    border: 1.5px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 28px;
    padding: 2.8rem 2.4rem 2.4rem;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 12px 60px rgba(0,0,0,.45);
  }

  .login-cat {
    font-size: 3.2rem;
    margin-bottom: .6rem;
    display: block;
    animation: fadeDown .4s .1s ease both;
    opacity: 0;
    animation-fill-mode: both;
    filter: drop-shadow(0 0 12px rgba(212,116,138,.6));
  }

  .login-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 2rem;
    color: #fff;
    line-height: 1.1;
    margin-bottom: .25rem;
    animation: fadeDown .4s .15s ease both;
    opacity: 0;
    animation-fill-mode: both;
    text-shadow: 0 2px 16px rgba(212,116,138,.4);
  }

  .login-title em { color: #f0a8bc; }

  .login-sub {
    font-size: .72rem;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 1.8rem;
    display: block;
    animation: fadeDown .4s .2s ease both;
    opacity: 0;
    animation-fill-mode: both;
  }

  .login-desc {
    font-size: .8rem;
    color: rgba(255,255,255,0.65);
    margin-bottom: 1.8rem;
    line-height: 1.6;
    animation: fadeDown .4s .25s ease both;
    opacity: 0;
    animation-fill-mode: both;
  }

  #login-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: .85rem 1.4rem;
    background: rgba(255,255,255,0.95);
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: .85rem;
    font-weight: 700;
    color: #3a2e28;
    cursor: po
